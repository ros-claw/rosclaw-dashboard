version: rosclaw.safety/v0.1
robot_id: ur5e_lab_002

emergency_stop:
  topic: /emergency_stop
  mode: latched

speed_limits:
  default:
    joint_velocity: 3.15
  near_human:
    joint_velocity: 0.5
  precision:
    joint_velocity: 0.3

workspace:
  bounds:
    x_min: -0.8
    x_max: 0.8
    y_min: -0.8
    y_max: 0.8
    z_min: 0.1
    z_max: 1.2

forbidden_zones:
  source: rosclaw-memory://maps/ur5e_forbidden_zones

approval_required:
  - skill: grasp_object
  - skill: move_near_human
  - skill: release_object_over_person

policy_events:
  publish_topic: /rosclaw/safety_events
